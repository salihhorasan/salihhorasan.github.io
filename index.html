<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Süslü Merhaba Animasyonu</title>
    <style>
        /* Sayfa ve Arkaplan Ayarları */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden; /* Kaydırma çubuklarını gizle */
            background-color: #0b0f19; /* Koyu lacivert/siyah arkaplan */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Animasyon Alanı */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; /* Yazının arkasında kalması için */
        }

        /* Süslü Merhaba Yazısı */
        .merhaba-text {
            position: relative;
            z-index: 2; /* Arkaplanın önünde durması için */
            
            /* RESPONSIVE YAZI BOYUTU (Sihirli Kısım) */
            /* Minimum 3rem, ideal olarak ekranın %12'si kadar, maksimum 8rem büyüklüğünde olur */
            font-size: clamp(3rem, 12vw, 8rem); 
            
            font-weight: 900;
            letter-spacing: 5px;
            /* Renk geçişi (Gradient) */
            background: linear-gradient(45deg, #00f2fe, #4facfe, #f093fb, #f5576c);
            background-size: 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            /* Hafif neon gölge */
            filter: drop-shadow(0px 0px 15px rgba(79, 172, 254, 0.5));
            animation: gradient-shift 5s ease infinite;
            pointer-events: none; /* Farenin yazının altındaki animasyonu algılaması için */
            text-align: center;
        }

        /* Yazı Rengi Animasyonu */
        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body>

    <canvas id="canvas-container"></canvas>
    
    <div class="merhaba-text">Merhaba</div>

    <script>
        // --- JavaScript ile Mouse/Touch Etkileşimli Partikül Animasyonu ---
        const canvas = document.getElementById('canvas-container');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particlesArray;

        // Farenin/Parmağın konumunu tutacağımız obje
        let mouse = {
            x: null,
            y: null,
            // Telefondaysa etki alanını biraz küçült, bilgisayardaysa normal bırak
            radius: window.innerWidth < 768 ? 100 : 150 
        }

        // --- BİLGİSAYAR İÇİN FARE DİNLEYİCİLERİ ---
        window.addEventListener('mousemove', function(event) {
            mouse.x = event.x;
            mouse.y = event.y;
        });

        window.addEventListener('mouseout', function() {
            mouse.x = undefined;
            mouse.y = undefined;
        });

        // --- MOBİL İÇİN DOKUNMATİK DİNLEYİCİLERİ (YENİ EKLENDİ) ---
        window.addEventListener('touchmove', function(event) {
            mouse.x = event.touches[0].clientX;
            mouse.y = event.touches[0].clientY;
        });

        window.addEventListener('touchend', function() {
            mouse.x = undefined;
            mouse.y = undefined;
        });

        // Partikül Sınıfı
        class Particle {
            constructor(x, y, directionX, directionY, size, color) {
                this.x = x;
                this.y = y;
                this.directionX = directionX;
                this.directionY = directionY;
                this.size = size;
                this.color = color;
            }
            
            // Partikülü çiz
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.fillStyle = '#4facfe';
                ctx.fill();
            }
            
            // Partikülün hareketini hesapla
            update() {
                if (this.x > canvas.width || this.x < 0) {
                    this.directionX = -this.directionX;
                }
                if (this.y > canvas.height || this.y < 0) {
                    this.directionY = -this.directionY;
                }

                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx*dx + dy*dy);

                if (distance < mouse.radius + this.size){
                    if (mouse.x < this.x && this.x < canvas.width - this.size * 10) {
                        this.x += 5;
                    }
                    if (mouse.x > this.x && this.x > this.size * 10) {
                        this.x -= 5;
                    }
                    if (mouse.y < this.y && this.y < canvas.height - this.size * 10) {
                        this.y += 5;
                    }
                    if (mouse.y > this.y && this.y > this.size * 10) {
                        this.y -= 5;
                    }
                }
                this.x += this.directionX;
                this.y += this.directionY;
                this.draw();
            }
        }

        // Partikülleri oluştur
        function init() {
            particlesArray = [];
            // Ekranda çok fazla partikül olup telefonu kasmasın diye yoğunluğu ayarladık
            let particleDensity = window.innerWidth < 768 ? 12000 : 9000;
            let numberOfParticles = (canvas.height * canvas.width) / particleDensity;
            
            for (let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 3) + 1;
                let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
                let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
                let directionX = (Math.random() * 2) - 1;
                let directionY = (Math.random() * 2) - 1;
                let color = '#4facfe';
                
                particlesArray.push(new Particle(x, y, directionX, directionY, size, color));
            }
        }

        // Çizgileri oluştur
        function connect() {
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x)) + 
                                   ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));
                    
                    if (distance < (canvas.width / 7) * (canvas.height / 7)) {
                        let opacityValue = 1 - (distance / 20000);
                        ctx.strokeStyle = 'rgba(79, 172, 254,' + opacityValue + ')';
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, innerWidth, innerHeight);
            
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
            }
            connect();
        }

        // Ekran boyutu değiştiğinde/telefon yan çevrildiğinde güncelle
        window.addEventListener('resize', function(){
            canvas.width = innerWidth;
            canvas.height = innerHeight;
            mouse.radius = window.innerWidth < 768 ? 100 : 150;
            init();
        });

        init();
        animate();
    </script>
</body>
</html>
