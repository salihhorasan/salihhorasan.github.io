<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marginal - Snow Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons|Material+Icons+Outlined|Material+Icons+Round" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#e50914',
                        'surface-dark': '#0d1117',
                        'surface-darker': '#010409',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #010409; color: white; overflow-x: hidden; }
        .card-hover:hover { transform: translateY(-5px); transition: all 0.3s ease; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0d1117; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
</head>
<body class="dark">

    <nav class="fixed top-0 left-0 right-0 z-50 w-full bg-surface-dark/90 backdrop-blur-md border-b border-gray-800">
        <div class="h-16 flex items-center justify-between px-6 max-w-[1400px] mx-auto">
            <div class="flex items-center gap-2 cursor-pointer" onclick="location.reload()">
                <div class="bg-primary text-white p-1.5 rounded-lg shadow-lg">
                    <span class="material-icons-round text-lg">movie</span>
                </div>
                <span class="text-xl font-bold text-primary tracking-tight">Marginal</span>
            </div>
            
            <button onclick="toggleSearch()" class="flex items-center gap-2 bg-gray-800 hover:bg-gray-700 px-4 py-2 rounded-full transition-all group">
                <span class="material-icons-outlined text-gray-400 group-hover:text-white">search</span>
                <span class="text-sm text-gray-400 group-hover:text-white font-medium">Film/Dizi Ara...</span>
                <span class="bg-gray-700 text-xs px-1.5 py-0.5 rounded text-gray-400 border border-gray-600">CTRL+K</span>
            </button>
        </div>
    </nav>

    <div id="search-modal" class="hidden fixed inset-0 z-[100] bg-black/80 backdrop-blur-sm flex items-center justify-center transition-opacity duration-300 p-4">
        <div class="w-full max-w-3xl bg-surface-dark rounded-2xl shadow-2xl border border-gray-800 overflow-hidden transform transition-all scale-100">
            <div class="p-4 border-b border-gray-800 relative">
                <span class="material-icons-outlined absolute left-6 top-1/2 -translate-y-1/2 text-gray-500">search</span>
                <input type="text" id="search-input" placeholder="Film veya Dizi adı yazın..." class="w-full bg-surface-darker text-white pl-12 pr-10 py-3 rounded-xl border border-gray-700 focus:border-primary focus:outline-none text-lg">
                <button onclick="toggleSearch()" class="absolute right-6 top-1/2 -translate-y-1/2 text-gray-500 hover:text-white">
                    <span class="material-icons-outlined">close</span>
                </button>
            </div>
            <div id="search-results" class="max-h-[60vh] overflow-y-auto p-2">
                <div class="text-center py-10 text-gray-500">Aramak için yazmaya başlayın...</div>
            </div>
        </div>
    </div>

    <div class="relative w-full h-screen overflow-hidden">
        <div id="hero-backdrop" class="absolute inset-0 bg-cover bg-center transition-all duration-1000 transform scale-105">
            <div class="absolute inset-0 bg-gradient-to-b from-surface-dark/30 via-surface-dark/60 to-surface-darker"></div>
        </div>
        <canvas id="snowCanvas" class="absolute top-0 left-0 w-full h-full z-10 pointer-events-none"></canvas>
        <div class="hidden" id="data-title">LOADING...</div>
    </div>

    <main class="relative z-20 -mt-32 pb-20 px-4 container mx-auto max-w-[1200px]">
        <div class="bg-surface-dark/80 backdrop-blur-xl border border-gray-800 rounded-3xl p-6 md:p-10 shadow-2xl flex flex-col md:flex-row gap-8">
            <div class="w-full md:w-1/3 lg:w-1/4 flex-shrink-0">
                <div class="relative rounded-xl overflow-hidden shadow-lg border border-gray-700 group">
                    <img id="movie-poster" src="" alt="Poster" class="w-full h-auto object-cover transform group-hover:scale-105 transition-transform duration-500">
                    <div id="media-type-badge" class="absolute top-2 right-2 px-2 py-1 bg-black/70 backdrop-blur text-xs font-bold rounded text-white uppercase border border-gray-600 hidden">
                        MOVIE
                    </div>
                </div>
            </div>

            <div class="flex-1 space-y-6">
                <div class="flex flex-wrap items-center gap-3 text-sm text-gray-400">
                    <span id="movie-date" class="px-3 py-1 bg-gray-800 rounded-full border border-gray-700"></span>
                    <span id="movie-rating" class="flex items-center gap-1 px-3 py-1 bg-gray-800 rounded-full border border-gray-700 text-yellow-500 font-bold">
                        <span class="material-icons-round text-sm">star</span> <span></span>
                    </span>
                </div>

                <p id="movie-overview" class="text-gray-300 text-lg leading-relaxed italic"></p>

                <div>
                    <h3 class="text-sm font-bold text-primary uppercase tracking-wider mb-3">Türler</h3>
                    <div id="movie-genres" class="flex flex-wrap gap-2"></div>
                </div>

                <div>
                    <h3 class="text-sm font-bold text-primary uppercase tracking-wider mb-3">Oyuncular</h3>
                    <div id="movie-cast" class="flex flex-wrap gap-2"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // API AYARLARI
        const TMDB_BEARER_TOKEN = 'eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiIwNzFjZjQxYTA5M2M1MzNmMmVhYmY1YzNhMDMwNjVhNCIsIm5iZiI6MTcyMjUxMTA0MC4wMDcsInN1YiI6IjY2YWI2ZWJmODNhYmQzNzI4ZjUwN2MyOCIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.lNQQzOOKQnKDNHY2jcG_ZSEDgS2h35nSfNe1TTvr7SQ';
        
        const BASE_URL = 'https://api.themoviedb.org/3';
        const IMAGE_BASE_URL = 'https://image.tmdb.org/t/p/original';
        const POSTER_BASE_URL = 'https://image.tmdb.org/t/p/w500';

        const API_OPTIONS = {
            method: 'GET',
            headers: {
                accept: 'application/json',
                Authorization: `Bearer ${TMDB_BEARER_TOKEN}`
            }
        };

        let currentMovieTitle = "";
        let snowAnimationObj = null;

        window.addEventListener('load', () => {
            fetchTrendingMovie();
        });

        // --- GÜNCELLENMİŞ API FONKSİYONLARI ---

        async function fetchTrendingMovie() {
            try {
                const response = await fetch(`${BASE_URL}/trending/all/week?language=tr-TR`, API_OPTIONS);
                const data = await response.json();
                // Sadece film veya dizi olan ilk sonucu al (kişi olmasın)
                const validResult = data.results.find(item => item.media_type === 'movie' || item.media_type === 'tv');
                if (validResult) {
                    loadDetails(validResult.id, validResult.media_type);
                }
            } catch (error) {
                console.error("Trend hatası:", error);
            }
        }

        // Hem Dizi Hem Film Yükleyen Fonksiyon
        async function loadDetails(id, mediaType) {
            try {
                // mediaType: 'movie' veya 'tv'
                const response = await fetch(`${BASE_URL}/${mediaType}/${id}?language=tr-TR&append_to_response=credits`, API_OPTIONS);
                const data = await response.json();
                
                // Gelen veriye türü de ekleyelim ki UI bilsin
                data.media_type = mediaType;
                
                updateUI(data);
            } catch (error) {
                console.error("Detay yükleme hatası:", error);
            }
        }

        // --- SEARCH MULTI (FİLM VE DİZİ BİRLİKTE) ---
        async function searchMulti(query) {
            if (!query) return;
            // 'search/movie' yerine 'search/multi' kullanıyoruz
            const res = await fetch(`${BASE_URL}/search/multi?language=tr-TR&query=${query}&page=1`, API_OPTIONS);
            const data = await res.json();
            renderSearchResults(data.results);
        }

        // --- UI GÜNCELLEME ---

        function updateUI(item) {
            // İsimlendirme (Film için 'title', Dizi için 'name')
            const title = item.title || item.name || "Bilinmiyor";
            const originalTitle = item.original_title || item.original_name || "";
            
            // Tarih (Film için 'release_date', Dizi için 'first_air_date')
            const dateStr = item.release_date || item.first_air_date || "";
            const year = dateStr.split('-')[0] || "N/A";

            // Başlığı güncelle (Kar efekti için)
            document.getElementById('data-title').innerText = title.toUpperCase();
            
            // Backdrop
            const backdrop = document.getElementById('hero-backdrop');
            if (item.backdrop_path) {
                backdrop.style.backgroundImage = `url('${IMAGE_BASE_URL}${item.backdrop_path}')`;
            } else {
                backdrop.style.backgroundImage = `linear-gradient(to bottom, #000, #111)`;
            }

            // Poster
            const poster = document.getElementById('movie-poster');
            poster.src = item.poster_path ? `${POSTER_BASE_URL}${item.poster_path}` : 'https://via.placeholder.com/500x750?text=No+Poster';

            // Media Type Badge
            const badge = document.getElementById('media-type-badge');
            badge.classList.remove('hidden');
            badge.innerText = item.media_type === 'tv' ? 'TV SHOW' : 'MOVIE';
            badge.className = `absolute top-2 right-2 px-2 py-1 backdrop-blur text-xs font-bold rounded text-white uppercase border ${item.media_type === 'tv' ? 'bg-purple-600/70 border-purple-400' : 'bg-red-600/70 border-red-400'}`;

            // Metadata
            document.getElementById('movie-date').innerText = year;
            document.getElementById('movie-rating').querySelector('span:last-child').innerText = item.vote_average ? item.vote_average.toFixed(1) : '0';
            document.getElementById('movie-overview').innerText = item.overview || "Özet bulunamadı.";

            // Türler
            const genresDiv = document.getElementById('movie-genres');
            if (item.genres) {
                genresDiv.innerHTML = item.genres.map(g => `<span class="px-3 py-1 bg-surface-darker border border-gray-700 rounded-lg text-xs text-gray-400">${g.name}</span>`).join('');
            }

            // Oyuncular
            const castDiv = document.getElementById('movie-cast');
            if (item.credits && item.credits.cast) {
                castDiv.innerHTML = item.credits.cast.slice(0, 5).map(c => `<span class="px-3 py-1 bg-surface-darker border border-gray-700 rounded-lg text-xs text-gray-400">${c.name}</span>`).join('');
            }

            // Kar Efektini Başlat
            startSnowEffect(title.toUpperCase());
        }


        // --- ARAMA FONKSİYONLARI ---

        function toggleSearch() {
            const modal = document.getElementById('search-modal');
            modal.classList.toggle('hidden');
            if (!modal.classList.contains('hidden')) {
                document.getElementById('search-input').focus();
            }
        }

        let searchTimeout;
        document.getElementById('search-input').addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                const query = e.target.value;
                if (query.length > 2) searchMulti(query); // searchMovies yerine searchMulti
            }, 300);
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') document.getElementById('search-modal').classList.add('hidden');
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                toggleSearch();
            }
        });

        function renderSearchResults(results) {
            const container = document.getElementById('search-results');
            container.innerHTML = '';
            
            if (!results || results.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-500 py-4">Sonuç bulunamadı.</div>';
                return;
            }

            // Sadece Film ve Dizileri filtrele (Kişileri çıkar)
            const filteredResults = results.filter(item => item.media_type === 'movie' || item.media_type === 'tv');

            if (filteredResults.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-500 py-4">İlgili film veya dizi bulunamadı.</div>';
                return;
            }

            filteredResults.forEach(item => {
                if (!item.poster_path && !item.backdrop_path) return;

                // Veri Normalizasyonu (Movie vs TV)
                const title = item.title || item.name;
                const date = item.release_date || item.first_air_date;
                const year = date ? date.split('-')[0] : '';
                const typeLabel = item.media_type === 'tv' ? 'Dizi' : 'Film';
                const typeColor = item.media_type === 'tv' ? 'text-purple-400' : 'text-red-400';

                const el = document.createElement('div');
                el.className = 'flex items-center gap-4 p-3 hover:bg-gray-800 rounded-xl cursor-pointer transition-colors border border-transparent hover:border-gray-700';
                
                el.onclick = () => {
                    loadDetails(item.id, item.media_type); // ID ve Tipi gönderiyoruz
                    toggleSearch();
                };
                
                const imgUrl = item.poster_path ? `${POSTER_BASE_URL}${item.poster_path}` : 'https://via.placeholder.com/500x750';
                
                el.innerHTML = `
                    <div class="relative">
                        <img src="${imgUrl}" class="w-12 h-16 object-cover rounded-lg bg-gray-700">
                    </div>
                    <div>
                        <h4 class="font-bold text-white flex items-center gap-2">
                            ${title} 
                            <span class="text-[10px] uppercase border border-gray-600 px-1 rounded ${typeColor}">${typeLabel}</span>
                        </h4>
                        <div class="text-xs text-gray-400 flex items-center gap-2 mt-1">
                            <span>${year}</span>
                            <span class="w-1 h-1 bg-gray-600 rounded-full"></span>
                            <span class="text-yellow-500 flex items-center gap-0.5"><i class="material-icons-round text-[10px]">star</i> ${item.vote_average ? item.vote_average.toFixed(1) : '0'}</span>
                        </div>
                    </div>
                `;
                container.appendChild(el);
            });
        }

        // --- SNOW TEXT REVEAL ENGINE (Aynı Kalıyor) ---
        function startSnowEffect(textToRender) {
            const canvas = document.getElementById('snowCanvas');
            if (!canvas) return;
            if (window.snowAnimationObj) cancelAnimationFrame(window.snowAnimationObj);
            
            const ctx = canvas.getContext('2d');
            let width, height;
            let particles = [];
            let textCoordinates = []; 
            let filledPixels = 0;
            let totalPixels = 0;
            let progress = 0;
            let particleCount = 1500; 

            function init() { resize(); createParticles(); animate(); }
            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
                createTextMap();
            }
            function createTextMap() {
                ctx.clearRect(0,0,width,height);
                ctx.fillStyle = 'white';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                let fontSize = 130;
                if (width < 768) fontSize = 60;
                ctx.font = `900 ${fontSize}px Verdana, sans-serif`;
                let textWidth = ctx.measureText(textToRender).width;
                while (textWidth > width * 0.9 && fontSize > 30) {
                    fontSize -= 5;
                    ctx.font = `900 ${fontSize}px Verdana, sans-serif`;
                    textWidth = ctx.measureText(textToRender).width;
                }
                ctx.fillText(textToRender, width / 2, height / 2 - 50);
                const imageData = ctx.getImageData(0, 0, width, height);
                const data = imageData.data;
                textCoordinates = [];
                filledPixels = 0;
                progress = 0;
                const density = 4; 
                for (let y = 0; y < height; y += density) {
                    for (let x = 0; x < width; x += density) {
                        if (data[((width * y) + x) * 4 + 3] > 128) {
                            textCoordinates.push({ x: x, y: y, filled: false });
                        }
                    }
                }
                totalPixels = textCoordinates.length;
                ctx.clearRect(0, 0, width, height);
            }
            function createParticles() {
                particles = [];
                for (let i = 0; i < particleCount; i++) { particles.push(new Particle()); }
            }
            class Particle {
                constructor(isNew = false) { this.reset(isNew); }
                reset(isNew) {
                    this.x = (Math.random() * (width * 1.5)) - (width * 0.5); 
                    this.y = isNew ? -10 : Math.random() * height;
                    this.vx = 2 + Math.random() * 2; 
                    this.vy = 2 + Math.random() * 2; 
                    this.size = Math.random() * 2 + 1;
                    this.isStuck = false;
                    this.isDead = false;
                }
                update() {
                    if (this.isStuck) return;
                    this.x += this.vx;
                    this.y += this.vy;
                    if (progress < 0.75) {
                        if (this.y > (height/2 - 200) && this.y < (height/2 + 200)) {
                            if (Math.random() > 0.85) this.checkCollision();
                        }
                    }
                    if (this.x > width + 20 || this.y > height) this.handleRespawn();
                }
                handleRespawn() {
                    if (progress >= 0.75) {
                        const activeSnow = particles.filter(p => !p.isDead && !p.isStuck).length;
                        if (activeSnow > 150) { this.isDead = true; return; }
                    } else if (progress >= 0.50) {
                        if (Math.random() > 0.5) { this.isDead = true; return; }
                    }
                    this.reset(true);
                }
                checkCollision() {
                    for (let i = 0; i < textCoordinates.length; i++) {
                        let p = textCoordinates[i];
                        if (!p.filled) {
                            let dx = this.x - p.x;
                            let dy = this.y - p.y;
                            if (dx*dx + dy*dy < 16) { 
                                this.isStuck = true;
                                this.x = p.x;
                                this.y = p.y;
                                p.filled = true;
                                filledPixels++;
                                progress = filledPixels / totalPixels;
                                if (progress < 0.50) particles.push(new Particle(true)); 
                                break;
                            }
                        }
                    }
                }
                draw() {
                    if (this.isDead) return;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                    ctx.fill();
                }
            }
            function animate() {
                ctx.clearRect(0, 0, width, height);
                if (particles.length > 200 && progress > 0.5) particles = particles.filter(p => !p.isDead);
                particles.forEach(p => { p.update(); p.draw(); });
                window.snowAnimationObj = requestAnimationFrame(animate);
            }
            window.addEventListener('resize', () => { resize(); particles = []; createParticles(); });
            init();
        }

    </script>
</body>
</html>
